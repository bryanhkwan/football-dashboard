<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toledo Football Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  </head>
  <body>
    <header class="appHeader" id="topNav">
      <div class="appHeaderMain">
        <div class="appIntro">
          <div class="appTagRow">
            <span class="appTag appTagPrimary">Toledo Football Ops</span>
            <span class="appTag">Internal platform</span>
          </div>
          <h1>Football Operations Dashboard</h1>
          <p class="sub">
            Revenue sharing, roster planning, national player intelligence, and player dossiers for Toledo football.
          </p>
        </div>
        <div class="appControlRail">
          <span class="appUserMeta" id="navSub">Compensation Dashboard</span>
          <div class="appActionGroup" id="navActions"></div>
        </div>
      </div>
      <div class="appFocusRow">
        <span class="appFocusPill">Expense planning</span>
        <span class="appFocusPill">National search</span>
        <span class="appFocusPill">Roster context</span>
        <span class="appFocusPill">Player dossiers</span>
      </div>
    </header>

    <nav class="pageNav" id="pageNav">
      <button class="pageNavBtn active" data-page="pageExpenses">Expenses</button>
      <button class="pageNavBtn" data-page="pagePlayers">Players</button>
    </nav>

    <div id="pageExpenses" class="page active">
      <div id="expContent"></div>
    </div>

    <div id="pagePlayers" class="page">
      <div id="natContent"></div>
    </div>

    <script src="modules/config.js"></script>
    <script src="modules/cache.js"></script>
    <script src="modules/matching.js"></script>
    <script src="modules/evaluation.js"></script>
    <script src="modules/expenses.js"></script>
    <script src="modules/national.js"></script>
    <script src="modules/profile.js"></script>
    <script src="app.js"></script>
  </body>
</html>
